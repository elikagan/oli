<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>OLI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- Top Bar -->
  <header id="topbar">
    <span class="topbar-title">OLI</span>
    <div class="menu-wrap">
      <button id="menu-btn" class="icon-btn" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="3" y1="5" x2="17" y2="5"/>
          <line x1="3" y1="10" x2="17" y2="10"/>
          <line x1="3" y1="15" x2="17" y2="15"/>
        </svg>
      </button>
      <div id="menu-dropdown" class="menu-dropdown hidden">
        <button class="menu-item" data-action="stats">Stats</button>
        <button class="menu-item" data-action="refresh">Refresh Feed</button>
      </div>
    </div>
  </header>

  <!-- Swipe Screen -->
  <main id="scout-view" class="view">
    <div id="pull-indicator" class="pull-indicator">
      <div class="spinner"></div>
    </div>
    <div id="scout-content" class="scout-content">
      <div id="loading" class="loading-state hidden">
        <div class="spinner"></div>
        <p class="loading-text">Loading listings…</p>
      </div>
      <div id="card-stack" class="card-stack">
        <!-- Cards injected by JS -->
      </div>
      <div id="empty-state" class="empty-state hidden">
        <p>No more listings to review.</p>
        <p class="empty-sub">Check back later for new listings.</p>
      </div>
    </div>
  </main>

  <!-- Action buttons (outside scout-content to avoid will-change containment) -->
  <div id="action-btns" class="action-btns hidden">
    <button id="hate-btn" class="action-btn hate-btn" aria-label="Super Hate">&#128465;</button>
    <button id="fav-btn" class="action-btn fav-btn" aria-label="Favorite">&#9733;</button>
    <button id="super-btn" class="action-btn super-btn" aria-label="Super Like">&#128293;</button>
  </div>

  <!-- Investigate Screen -->
  <section id="investigate-view" class="view hidden">
    <div class="section-header" id="saved-header">Saved Items <span id="saved-count" class="section-count"></span></div>
    <div id="fav-list" class="fav-list">
      <!-- Favorites injected by JS -->
    </div>
    <div id="fav-empty" class="empty-state" style="height:auto;padding:32px 24px;">
      <p>No saved items yet.</p>
      <p class="empty-sub">Star items while scouting to add them here.</p>
    </div>
  </section>

  <!-- Artists Screen -->
  <section id="artists-view" class="view hidden">
    <div class="section-header">Artist Targets <span id="artists-count" class="section-count"></span></div>
    <div id="artist-list" class="fav-list">
      <!-- Artists injected by JS -->
    </div>
    <div id="artist-empty" class="empty-state" style="height:auto;padding:32px 24px;">
      <p>No artist targets loaded.</p>
      <p class="empty-sub">Import artists via the API.</p>
    </div>
  </section>

  <!-- Settings Screen -->
  <section id="settings-view" class="view hidden">
    <h2 class="settings-title">Stats</h2>
    <div class="settings-form">
      <div class="settings-stats" id="settings-stats"></div>
      <div id="accuracy-chart-wrap"></div>
      <div style="margin-top: 24px;">
        <button id="cfg-cancel" class="btn-secondary" style="width:100%;">Back</button>
      </div>
    </div>
  </section>

  <!-- Bottom Tab Bar -->
  <nav id="tabbar">
    <button class="tab active" data-tab="scout">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <span>Scout</span>
    </button>
    <button class="tab" data-tab="investigate">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Saved</span>
    </button>
    <button class="tab" data-tab="artists">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>Artists</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
