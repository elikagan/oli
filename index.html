<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>OLI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- Top Bar -->
  <header id="topbar">
    <span class="topbar-title">OLI</span>
    <button id="settings-btn" class="icon-btn" aria-label="Settings">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="10" cy="10" r="3"/>
        <path d="M10 1v2m0 14v2M1 10h2m14 0h2m-3.3-5.3 1.4-1.4M4.9 15.5l1.4-1.4m0-8.2L4.9 4.5m10.2 11 1.4 1.4"/>
      </svg>
    </button>
  </header>

  <!-- Swipe Screen -->
  <main id="scout-view" class="view">
    <div id="loading" class="loading-state hidden">
      <div class="spinner"></div>
      <p class="loading-text">Loading listings…</p>
    </div>
    <div id="card-stack" class="card-stack">
      <!-- Cards injected by JS -->
    </div>
    <div id="empty-state" class="empty-state hidden">
      <p>No more listings to review.</p>
      <p class="empty-sub">Check back later for new listings.</p>
    </div>
    <button id="fav-btn" class="fav-btn hidden" aria-label="Favorite">&#9733;</button>
  </main>

  <!-- Investigate Screen -->
  <section id="investigate-view" class="view hidden">
    <div id="fav-list" class="fav-list">
      <!-- Favorites injected by JS -->
    </div>
    <div id="fav-empty" class="empty-state">
      <p>No saved items yet.</p>
      <p class="empty-sub">Star items while scouting to add them here.</p>
    </div>
  </section>

  <!-- Settings Screen -->
  <section id="settings-view" class="view hidden">
    <h2 class="settings-title">Settings</h2>
    <div class="settings-form">
      <div class="settings-stats" id="settings-stats"></div>
      <div style="margin-top: 24px;">
        <button id="cfg-cancel" class="btn-secondary" style="width:100%;">Back</button>
      </div>
    </div>
  </section>

  <!-- Bottom Tab Bar -->
  <nav id="tabbar">
    <button class="tab active" data-tab="scout">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <span>Scout</span>
    </button>
    <button class="tab" data-tab="investigate">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Investigate</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
