<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>OLI</title>
  <link rel="stylesheet" href="style.css?v=32">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- Top Bar -->
  <header id="topbar">
    <span class="topbar-title">OLI</span>
    <div class="topbar-right">
      <input type="text" id="search-input" class="search-input" placeholder="Search artists…">
    </div>
  </header>

  <!-- View Tabs -->
  <nav id="view-tabs">
    <button class="vtab active" data-view="prospects">Prospects</button>
    <button class="vtab" data-view="contacted">Contacted</button>
    <button class="vtab" data-view="responded">Responded</button>
    <button class="vtab" data-view="deal">Deal</button>
    <button class="vtab" data-view="consigning">Consigning</button>
    <button class="vtab" data-view="all">All</button>
  </nav>

  <!-- Filter chips (prospects view only) -->
  <div id="filter-bar" class="filter-bar">
    <button class="chip" data-filter="local">Local</button>
    <button class="chip" data-filter="65+">65+</button>
    <button class="chip" data-filter="contact">Has Contact</button>
  </div>

  <!-- Main Content -->
  <main id="main">
    <div id="artist-list" class="artist-list"></div>
    <div id="empty-state" class="empty-state hidden">
      <p>No matches.</p>
      <p class="empty-sub">Try changing your filters.</p>
    </div>
    <div id="loading" class="loading-state hidden">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- Artist Detail (overlay) -->
  <section id="artist-detail" class="detail-overlay hidden">
    <div class="detail-header">
      <button id="detail-back" class="back-btn">&larr;</button>
      <div class="detail-title-wrap">
        <h2 id="detail-name" class="detail-name"></h2>
        <span id="detail-meta" class="detail-meta"></span>
      </div>
      <div class="detail-actions">
        <select id="detail-status" class="status-select"></select>
      </div>
    </div>
    <div id="detail-body" class="detail-body">
      <div id="detail-summary" class="detail-section"></div>
      <div id="detail-contact" class="detail-section"></div>
      <div id="detail-action-btns" class="detail-action-btns"></div>
      <div class="detail-section">
        <div class="section-label">Auction Lots</div>
        <div id="detail-images" class="image-grid"></div>
      </div>
      <div id="detail-lots" class="detail-section"></div>
      <div id="detail-outreach" class="detail-section"></div>
    </div>
  </section>

  <!-- Email Compose Modal -->
  <div id="email-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>Compose Email</h3>
        <button id="email-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-field">
          <label>To</label>
          <input type="email" id="email-to" class="form-input">
        </div>
        <div class="form-field">
          <label>Subject</label>
          <input type="text" id="email-subject" class="form-input">
        </div>
        <div class="form-field">
          <label>Body</label>
          <textarea id="email-body" class="form-textarea" rows="12"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="email-generate" class="btn-secondary">Generate with AI</button>
        <button id="email-send" class="btn-primary">Send</button>
      </div>
    </div>
  </div>

  <!-- Admin (bottom sheet) -->
  <div id="admin-sheet" class="bottom-sheet hidden">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <h3>Pipeline Stats</h3>
      <div id="stats-grid" class="stats-grid"></div>
      <h3 style="margin-top:20px">Import</h3>
      <div class="import-btns">
        <button id="btn-scrape-all" class="btn-secondary">Scrape All Houses</button>
        <button id="btn-extract" class="btn-secondary">Extract Artists</button>
        <button id="btn-research" class="btn-secondary">Research Batch</button>
      </div>
      <div id="import-log" class="import-log"></div>
    </div>
  </div>

  <!-- Bottom Tab Bar -->
  <nav id="tabbar">
    <button class="tab active" data-tab="pipeline">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>Pipeline</span>
    </button>
    <button class="tab" data-tab="admin">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span>Admin</span>
    </button>
  </nav>

  <script src="app.js?v=32"></script>
</body>
</html>
